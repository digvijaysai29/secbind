name: Audit

on:
  schedule:
    - cron: '0 3 * * 1'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install cargo-audit --locked
      - run: cargo audit
