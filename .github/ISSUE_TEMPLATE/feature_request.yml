name: Feature request
description: Propose a new capability or improvement
title: "[feat] "
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe behavior, API, and UX.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - secbind-cli
        - secbind-core
        - node-sdk
        - docs
        - other
    validations:
      required: true
