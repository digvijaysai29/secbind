name: Bug report
description: Report a reproducible defect or regression
title: "[bug] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: "e.g. v0.1.0 or abc1234"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - secbind-cli
        - secbind-core
        - node-sdk
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets before posting logs.
      render: shell
